server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Exact health mapping strips only the external /api prefix.
  location = /api/actuator/health {
    proxy_pass http://backend:8081/actuator/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Keep /api/v1/... intact: no trailing slash on proxy_pass means no URI rewrite.
  # API requests never fall through to the SPA index document.
  location ^~ /api/ {
    proxy_pass http://backend:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_unavailable;
  }
  location @api_unavailable {
    default_type application/json;
    return 503 '{"code":"API_UNAVAILABLE","message":"后端服务暂不可用"}';
  }
  location / { try_files $uri $uri/ /index.html; }
}
