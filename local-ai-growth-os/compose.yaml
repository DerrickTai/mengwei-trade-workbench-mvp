services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: local_growth
      POSTGRES_USER: local_growth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_growth_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_growth -d local_growth"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  backend:
    build: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/local_growth
      DATABASE_USERNAME: local_growth
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-local_growth_dev}
      APP_AUTH_TOKEN: ${APP_AUTH_TOKEN:-replace-this-for-production}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: local-growth-assets
      APP_DEMO_SEED_ENABLED: ${APP_DEMO_SEED_ENABLED:-true}
      APP_OBSERVATION_STUB_ENABLED: ${APP_OBSERVATION_STUB_ENABLED:-false}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
    ports:
      - "8081:8081"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
volumes:
  postgres_data:
  minio_data:
