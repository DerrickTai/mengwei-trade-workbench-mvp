spring:
  application:
    name: local-ai-growth-os
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/local_growth}
    username: ${DATABASE_USERNAME:local_growth}
    password: ${DATABASE_PASSWORD:local_growth_dev}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8081}
app:
  auth-token: ${APP_AUTH_TOKEN:change-me-before-production}
  demo-seed-enabled: ${APP_DEMO_SEED_ENABLED:false}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
    bucket: ${MINIO_BUCKET:local-growth-assets}
  openai:
    base-url: ${OPENAI_COMPATIBLE_BASE_URL:}
    api-key: ${OPENAI_COMPATIBLE_API_KEY:}
    model: ${OPENAI_COMPATIBLE_MODEL:}
    connect-timeout-ms: ${OPENAI_COMPATIBLE_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${OPENAI_COMPATIBLE_READ_TIMEOUT_MS:30000}
  retest-automation:
    worker-enabled: ${APP_RETEST_AUTOMATION_WORKER_ENABLED:false}
    poll-interval-ms: ${APP_RETEST_AUTOMATION_POLL_INTERVAL_MS:60000}
    claim-limit: ${APP_RETEST_AUTOMATION_CLAIM_LIMIT:3}
    lease-seconds: ${APP_RETEST_AUTOMATION_LEASE_SECONDS:300}
    max-cells-per-point: ${APP_RETEST_AUTOMATION_MAX_CELLS_PER_POINT:200}
  observation:
    stub-enabled: ${APP_OBSERVATION_STUB_ENABLED:false}
  publisher-worker:
    enabled: ${PUBLISHER_WORKER_ENABLED:false}
    hmac-secret: ${PUBLISHER_WORKER_HMAC_SECRET:}
    id-allowlist: ${PUBLISHER_WORKER_ID_ALLOWLIST:}
    timestamp-window-seconds: ${PUBLISHER_WORKER_TIMESTAMP_WINDOW_SECONDS:300}
    lease-seconds: ${PUBLISHER_WORKER_LEASE_SECONDS:300}
    max-attempts: ${PUBLISHER_WORKER_MAX_ATTEMPTS:5}
    replay-ttl-seconds: ${PUBLISHER_WORKER_REPLAY_TTL_SECONDS:900}
